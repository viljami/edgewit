name: Generate and Publish API Docs

on:
  push:
    branches:
      - main
  # Allow manual triggering
  workflow_dispatch:

# Grant permissions needed for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent parallel deployments
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Generate OpenAPI Spec
        # Runs the utility binary to dump the JSON to docs/openapi.json
        run: cargo run --bin generate_openapi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
