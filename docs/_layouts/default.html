<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            {% if page.title %}{{ page.title }} | {% endif %}Edgewit
            Documentation
        </title>
        <style>
            :root {
                --primary: #ff5e00;
                --bg: #1a1a1a;
                --text: #f0f0f0;
                --surface: #2d2d2d;
                --surface-hover: #3d3d3d;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                line-height: 1.6;
                color: var(--text);
                background-color: var(--bg);
                margin: 0;
                padding: 0;
            }
            header {
                background-color: var(--surface);
                padding: 2rem 0;
                text-align: center;
                border-bottom: 3px solid var(--primary);
            }
            h1,
            h2,
            h3,
            h4,
            h5,
            h6 {
                color: #ffffff;
            }
            .container {
                max-width: 900px;
                margin: 0 auto;
                padding: 2rem;
            }
            .card {
                background: var(--surface);
                border-radius: 8px;
                padding: 1.5rem;
                margin-bottom: 2rem;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            }
            code {
                background: #000;
                padding: 0.2rem 0.4rem;
                border-radius: 4px;
                font-family: monospace;
                color: #56b6c2;
            }
            pre {
                background: #000;
                padding: 1rem;
                border-radius: 8px;
                overflow-x: auto;
            }
            pre code {
                background: none;
                padding: 0;
                color: #e5c07b;
            }
            a {
                color: var(--primary);
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }
            .nav {
                display: flex;
                gap: 1rem;
                justify-content: center;
                margin-top: 1rem;
                flex-wrap: wrap;
            }
            .btn {
                background: var(--primary);
                color: #fff;
                padding: 0.5rem 1rem;
                border-radius: 4px;
                font-weight: bold;
                display: inline-block;
            }
            .btn:hover {
                background: #e05300;
                text-decoration: none;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 1rem;
                margin-bottom: 1rem;
            }
            th,
            td {
                padding: 0.75rem;
                text-align: left;
                border-bottom: 1px solid #444;
            }
            th {
                background-color: #333;
                color: #fff;
            }
            blockquote {
                border-left: 4px solid var(--primary);
                margin: 0;
                padding-left: 1rem;
                color: #ccc;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Edgewit</h1>
            <p>
                A lightweight, Rust-based search and analytics engine for edge
                environments.
            </p>
            <div class="nav">
                <a href="{{ '/' | relative_url }}" class="btn">Home</a>
                <a href="{{ '/configuration/' | relative_url }}" class="btn"
                    >Configuration</a
                >
                <a href="{{ '/api/' | relative_url }}" class="btn">API Spec</a>
                <a href="{{ '/benchmark/' | relative_url }}" class="btn"
                    >Benchmarks</a
                >
                <a href="{{ '/security/' | relative_url }}" class="btn"
                    >Security Model</a
                >
                <a
                    href="https://github.com/viljami/edgewit"
                    class="btn"
                    target="_blank"
                    rel="noopener noreferrer"
                    >GitHub</a
                >
            </div>
        </header>

        <div class="container">{{ content }}</div>
    </body>
</html>
